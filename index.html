    <meta name="description" content="The Saga Foundation is a scholarship fund dedicated to supporting graduating seniors at Overfelt High School in East Side San Jose, honoring the Sagabaen family’s Filipino migrant legacy. Founded by alumnus Ian Sagabaen (Class of 2001), the foundation provides financial aid and career mentorship rooted in the values of discipline, resilience, and leadership. Operated as a Donor Advised Fund through Franklin Templeton, it serves as a transparent, community-driven bridge for students pursuing success in tech and higher education." />
